spring:
  application:
    name: paystream-auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USERNAME:paystream}
    password: ${DB_PASSWORD:localdevonly}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema; Hibernate must not modify it
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: 8081
  shutdown: graceful

spring.lifecycle.timeout-per-shutdown-phase: 30s

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

paystream:
  security:
    jwt:
      private-key-path: ${JWT_PRIVATE_KEY_PATH:keys/private.pem}
      public-key-path:  ${JWT_PUBLIC_KEY_PATH:keys/public.pem}
      access-token-ttl-seconds:  ${JWT_ACCESS_TTL:900}
      refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:604800}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.paystream: INFO
    org.springframework.security: WARN
