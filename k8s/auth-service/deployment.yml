apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: paystream
  labels:
    app: auth-service
    app.kubernetes.io/part-of: paystream
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0         # zero-downtime deploys
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/part-of: paystream
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      terminationGracePeriodSeconds: 35  # > server.shutdown graceful timeout (30s)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: auth-service
          image: ghcr.io/your-org/paystream/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: JAVA_OPTS
            - name: EUREKA_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: EUREKA_SERVER_URL
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paystream-secrets
                  key: REDIS_PASSWORD
            - name: DB_HOST
              value: "postgres-auth"
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: AUTH_DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: AUTH_DB_NAME
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: paystream-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paystream-secrets
                  key: DB_PASSWORD
            - name: ZIPKIN_HOST
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: ZIPKIN_HOST
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
