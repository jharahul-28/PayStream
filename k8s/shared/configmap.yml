apiVersion: v1
kind: ConfigMap
metadata:
  name: paystream-config
  namespace: paystream
  labels:
    app.kubernetes.io/part-of: paystream
data:
  # Service discovery
  EUREKA_SERVER_URL: "http://eureka-server:8761/eureka/"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka-headless:9092"

  # Redis
  REDIS_HOST: "redis-master"
  REDIS_PORT: "6379"

  # Observability
  ZIPKIN_HOST: "zipkin"

  # AI model
  AI_MODEL: "gpt-4o-mini"

  # JVM tuning (applied via JAVA_OPTS in each deployment)
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"

  # Database names (hosts provided per-service)
  AUTH_DB_PORT: "5432"
  AUTH_DB_NAME: "auth_db"
  PAYMENT_DB_PORT: "5432"
  PAYMENT_DB_NAME: "payment_db"
  WALLET_DB_PORT: "5432"
  WALLET_DB_NAME: "wallet_db"
  LEDGER_DB_PORT: "5432"
  LEDGER_DB_NAME: "ledger_db"
  SETTLEMENT_DB_PORT: "5432"
  SETTLEMENT_DB_NAME: "settlement_db"
  AUDIT_DB_PORT: "5432"
  AUDIT_DB_NAME: "audit_db"
  NOTIFICATION_DB_PORT: "5432"
  NOTIFICATION_DB_NAME: "notification_db"
  WEBHOOK_DB_PORT: "5432"
  WEBHOOK_DB_NAME: "webhook_db"
  FRAUD_DB_PORT: "5432"
  FRAUD_DB_NAME: "fraud_db"

  # Mail (notification-service)
  MAIL_HOST: "smtp-relay"
  MAIL_PORT: "587"
