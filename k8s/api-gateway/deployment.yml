apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: paystream
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: paystream
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/part-of: paystream
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      terminationGracePeriodSeconds: 35
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api-gateway
          image: ghcr.io/your-org/paystream/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: JAVA_OPTS
            - name: EUREKA_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: EUREKA_SERVER_URL
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paystream-secrets
                  key: REDIS_PASSWORD
            - name: AUTH_SERVICE_JWKS_URI
              value: "http://auth-service:8081/.well-known/jwks.json"
            - name: ZIPKIN_HOST
              valueFrom:
                configMapKeyRef:
                  name: paystream-config
                  key: ZIPKIN_HOST
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
